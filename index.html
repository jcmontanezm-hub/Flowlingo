<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowLingo – English Activity Game</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════ */
:root{
  --bg:#08061a;
  --surface:#0e0b28;
  --glass:rgba(255,255,255,.045);
  --glass2:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.1);
  --border2:rgba(255,255,255,.18);
  --accent:#f5c842;
  --accent2:#ff5f7e;
  --cyan:#00e5c8;
  --violet:#8b5cf6;
  --violet2:#a78bfa;
  --pink:#f472b6;
  --text:#eeeaf8;
  --muted:#7c749e;
  --muted2:#a89ec8;
  --r:18px;
  --r2:12px;
  --sh:0 20px 60px rgba(0,0,0,.6);
  --sh2:0 8px 32px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  display:flex;flex-direction:column;align-items:center;
}

/* Global page wrapper — keeps everything centred on wide screens */
.screen{
  width:100%;
  max-width:640px;
}

/* ── ANIMATED BACKGROUND ── */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.bg-orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.35;animation:drift 18s ease-in-out infinite alternate;}
.bg-orb:nth-child(1){width:600px;height:600px;background:radial-gradient(#6d28d9,transparent);top:-10%;left:-15%;animation-duration:20s;}
.bg-orb:nth-child(2){width:500px;height:500px;background:radial-gradient(#0891b2,transparent);bottom:-10%;right:-10%;animation-duration:25s;animation-delay:-8s;}
.bg-orb:nth-child(3){width:400px;height:400px;background:radial-gradient(#be185d,transparent);top:40%;left:50%;animation-duration:22s;animation-delay:-4s;}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,30px) scale(1.1)}}

/* grid overlay */
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:48px 48px;}

/* ── SCREENS ── */
.screen{position:relative;z-index:1;display:none!important;}
.screen.active{display:flex!important;flex-direction:column;}
.screen.active.blk{display:block!important;}
@keyframes screenIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.screen.active{animation:screenIn .45s cubic-bezier(.22,1,.36,1);}

/* ══════════════════════════════════════════
   SPLASH / LANDING
══════════════════════════════════════════ */
#splash.active{
  min-height:100vh;align-items:center;justify-content:center;
  padding:2rem;text-align:center;gap:0;
}
.splash-badge{
  display:inline-flex;align-items:center;gap:.5rem;
  background:rgba(139,92,246,.2);border:1px solid rgba(139,92,246,.4);
  border-radius:50px;padding:.35rem 1rem;font-size:.75rem;font-weight:700;
  color:var(--violet2);letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:1.5rem;
  animation:screenIn .5s .1s both;
}
.splash-logo{
  font-family:'Syne',sans-serif;font-size:clamp(3.5rem,12vw,6rem);
  font-weight:800;line-height:1;
  background:linear-gradient(135deg,#f5c842 0%,#ff5f7e 50%,#a78bfa 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:.5rem;
  animation:screenIn .5s .2s both;
}
.splash-tagline{
  font-size:1.05rem;color:var(--muted2);font-weight:500;letter-spacing:.02em;
  margin-bottom:2.5rem;max-width:380px;line-height:1.7;
  animation:screenIn .5s .3s both;
}
.splash-stats{
  display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;
  margin-bottom:2.5rem;
  animation:screenIn .5s .4s both;
}
.stat-pill{
  background:var(--glass);border:1px solid var(--border);
  border-radius:50px;padding:.4rem 1rem;font-size:.78rem;font-weight:600;color:var(--muted2);
  display:flex;align-items:center;gap:.4rem;
}
.stat-pill span{color:var(--accent);font-weight:800;}
.splash-btns{
  display:flex;flex-direction:column;gap:.7rem;width:100%;max-width:320px;
  animation:screenIn .5s .5s both;
}
.btn-primary{
  font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;
  background:linear-gradient(135deg,var(--accent),#ff8c42);
  color:#1a0a00;border:none;border-radius:50px;padding:.85rem 2rem;
  cursor:pointer;letter-spacing:.02em;
  box-shadow:0 8px 30px rgba(245,200,66,.3);
  transition:transform .15s,box-shadow .15s;
}
.btn-primary:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 12px 40px rgba(245,200,66,.45);}
.btn-secondary{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;font-weight:700;
  background:var(--glass);border:1px solid var(--border2);
  color:var(--text);border-radius:50px;padding:.75rem 2rem;cursor:pointer;
  transition:background .2s,border-color .2s;
}
.btn-secondary:hover{background:var(--glass2);border-color:var(--violet2);}
.splash-scroll{color:var(--muted);font-size:.75rem;margin-top:1.5rem;letter-spacing:.06em;animation:float 2s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* ══════════════════════════════════════════
   INSTRUCTIONS
══════════════════════════════════════════ */
#instructions.active{min-height:100vh;padding:3rem 1.5rem 2rem;align-items:center;}
.instr-header{text-align:center;margin-bottom:2rem;width:100%;max-width:560px;}
.instr-title{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;
  background:linear-gradient(135deg,var(--cyan),var(--violet2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:.4rem;}
.instr-sub{color:var(--muted2);font-size:.9rem;}
.instr-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;width:100%;max-width:560px;margin-bottom:1.5rem;}
.instr-card{
  background:var(--glass);border:1px solid var(--border);border-radius:var(--r);
  padding:1.1rem;transition:border-color .2s,background .2s;
}
.instr-card:hover{background:var(--glass2);border-color:var(--border2);}
.ic-icon{font-size:1.8rem;margin-bottom:.5rem;}
.ic-title{font-size:.82rem;font-weight:800;color:var(--text);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.06em;}
.ic-desc{font-size:.78rem;color:var(--muted2);line-height:1.65;}
.instr-timeline{
  background:var(--glass);border:1px solid var(--border);border-radius:var(--r);
  padding:1.25rem;width:100%;max-width:560px;margin-bottom:1.5rem;
}
.it-title{font-size:.75rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem;}
.it-row{display:flex;align-items:center;gap:.7rem;padding:.4rem 0;border-bottom:1px solid var(--border);
  font-size:.82rem;
}
.it-row:last-child{border:none;}
.it-lv{min-width:56px;font-weight:800;font-size:.78rem;color:var(--violet2);}
.it-name{flex:1;color:var(--muted2);}
.it-time{font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;color:var(--accent);}
.it-type{font-size:.7rem;color:var(--muted);background:rgba(255,255,255,.06);border-radius:6px;padding:.15rem .45rem;}
.instr-extra-box{
  display:flex;align-items:flex-start;gap:.8rem;
  background:rgba(0,229,200,.06);border:1px solid rgba(0,229,200,.2);
  border-radius:var(--r);padding:1rem;width:100%;max-width:560px;margin-bottom:1.5rem;
}
.ieb-icon{font-size:1.5rem;flex-shrink:0;margin-top:.1rem;}
.ieb-title{font-size:.82rem;font-weight:800;color:var(--cyan);margin-bottom:.25rem;}
.ieb-desc{font-size:.78rem;color:var(--muted2);line-height:1.65;}
.instr-cta{width:100%;max-width:560px;}
.btn-instr-go{
  width:100%;font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;
  background:linear-gradient(135deg,var(--cyan),var(--violet));
  color:#001a18;border:none;border-radius:50px;padding:.85rem;cursor:pointer;
  box-shadow:0 8px 30px rgba(0,229,200,.25);transition:transform .15s,box-shadow .15s;
}
.btn-instr-go:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,229,200,.4);}
.btn-back-splash{
  margin-top:.6rem;width:100%;background:transparent;border:none;color:var(--muted);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;font-weight:600;
  cursor:pointer;padding:.5rem;transition:color .2s;
}
.btn-back-splash:hover{color:var(--text);}

/* ══════════════════════════════════════════
   REGISTER
══════════════════════════════════════════ */
#register.active{min-height:100vh;align-items:center;justify-content:center;padding:2rem;text-align:center;}
.reg-logo{
  font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:.2rem;
}
.reg-sub{color:var(--muted2);font-size:.82rem;margin-bottom:2rem;letter-spacing:.04em;}
.reg-card{
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--r);padding:2rem;width:100%;max-width:420px;text-align:left;
  backdrop-filter:blur(20px);box-shadow:var(--sh);
}
.field-label{font-size:.72rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem;display:block;}
.reg-inp{
  width:100%;background:rgba(255,255,255,.05);
  border:1.5px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;
  padding:.7rem 1rem;outline:none;transition:border-color .25s,background .25s;
  margin-bottom:1.25rem;
}
.reg-inp:focus{border-color:var(--violet2);background:rgba(139,92,246,.06);}
.suggest-lbl{font-size:.72rem;color:var(--muted);margin-bottom:.5rem;display:block;}
.chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.25rem;}
.chip{
  background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);
  border-radius:50px;padding:.28rem .75rem;font-size:.76rem;
  cursor:pointer;color:var(--violet2);font-weight:600;
  transition:background .2s,border-color .2s,transform .1s;
}
.chip:hover{background:rgba(139,92,246,.25);border-color:var(--violet2);transform:translateY(-1px);}
.av-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.5rem;}
.av-opt{
  font-size:1.6rem;cursor:pointer;
  background:rgba(255,255,255,.05);border:1.5px solid transparent;
  border-radius:10px;padding:.28rem .4rem;
  transition:border-color .2s,background .2s,transform .15s;
}
.av-opt:hover{transform:scale(1.12);}
.av-opt.sel{border-color:var(--accent);background:rgba(245,200,66,.1);}
.divider{height:1px;background:var(--border);margin:1.25rem 0;}
.btn-go{
  width:100%;font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;
  background:linear-gradient(135deg,var(--accent),#ff8c42);
  color:#1a0a00;border:none;border-radius:50px;padding:.82rem;
  cursor:pointer;box-shadow:0 8px 28px rgba(245,200,66,.28);
  transition:transform .15s,box-shadow .15s;letter-spacing:.02em;
}
.btn-go:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(245,200,66,.42);}

/* ══════════════════════════════════════════
   HUD
══════════════════════════════════════════ */
#hud{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:640px;
  z-index:200;
  display:none;align-items:center;gap:.6rem;
  padding:.5rem 1rem;
  background:rgba(8,6,26,.85);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  border-radius:0 0 var(--r) var(--r);
}
#hud.vis{display:flex;}
.hud-av{font-size:1.3rem;}
.hud-nm{font-weight:800;font-size:.88rem;line-height:1;}
.hud-lv{font-size:.66rem;color:var(--muted);margin-top:.08rem;}
.hud-gap{flex:1;}
.hpill{
  display:flex;flex-direction:column;align-items:center;
  border-radius:10px;padding:.25rem .65rem;
}
.hpill-lbl{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;opacity:.7;}
.hpill-val{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;line-height:1.1;}
.hp-score{background:rgba(245,200,66,.12);border:1px solid rgba(245,200,66,.28);}
.hp-score .hpill-lbl{color:var(--accent);}
.hp-score .hpill-val{color:var(--accent);}
.hp-extra{background:rgba(0,229,200,.1);border:1px solid rgba(0,229,200,.25);cursor:pointer;}
.hp-extra .hpill-lbl{color:var(--cyan);}
.hp-extra .hpill-val{color:var(--cyan);}
.hp-timer{background:rgba(255,255,255,.06);border:1px solid var(--border);min-width:58px;}
.hp-timer .hpill-lbl{color:var(--muted);}
.hp-timer .hpill-val{color:var(--text);}
.hp-timer.warn{border-color:rgba(255,95,126,.4);background:rgba(255,95,126,.08);}
.hp-timer.warn .hpill-val{color:var(--accent2);animation:blink .5s infinite alternate;}
@keyframes blink{from{opacity:1}to{opacity:.4}}

/* ══════════════════════════════════════════
   PATH SCREEN
══════════════════════════════════════════ */
#path-screen.active{min-height:100vh;padding:5rem 1.5rem 2rem;align-items:center;}
.path-header{text-align:center;margin-bottom:1.5rem;width:100%;max-width:500px;}
.path-h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--accent);}
.path-h2{color:var(--muted2);font-size:.82rem;margin-top:.25rem;}
.path-progress-bar{
  width:100%;max-width:500px;
  background:rgba(255,255,255,.06);border-radius:50px;height:5px;
  margin-bottom:1.2rem;overflow:hidden;
}
.path-progress-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--cyan),var(--violet2));transition:width .6s ease;}
.path-track{display:flex;flex-direction:column;gap:.55rem;width:100%;max-width:500px;}
.pstep{
  display:flex;align-items:center;gap:.75rem;
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--r);padding:.85rem 1rem;
  transition:border-color .3s,background .3s,transform .2s;
}
.pstep:hover{transform:translateX(2px);}
.pstep.done{border-color:rgba(0,229,200,.25);background:rgba(0,229,200,.04);}
.pstep.cur{border-color:rgba(245,200,66,.5);background:rgba(245,200,66,.05);box-shadow:0 0 24px rgba(245,200,66,.1);}
.pstep.lock{opacity:.35;}
.ps-ico{font-size:1.7rem;min-width:2rem;text-align:center;}
.ps-info{flex:1;}
.ps-nm{font-weight:800;font-size:.9rem;}
.ps-tp{font-size:.71rem;color:var(--muted);margin-top:.1rem;}
.ps-pts{font-size:.76rem;color:var(--violet2);font-weight:700;margin-top:.15rem;}
.ps-badge{font-size:.72rem;font-weight:800;padding:.2rem .6rem;border-radius:8px;white-space:nowrap;}
.ps-badge.db{background:rgba(0,229,200,.15);color:var(--cyan);}
.ps-badge.cb{background:rgba(245,200,66,.15);color:var(--accent);}
.ps-badge.lb{background:rgba(255,255,255,.06);color:var(--muted);}
.path-cta{margin-top:1.3rem;width:100%;max-width:500px;display:flex;flex-direction:column;gap:.55rem;}
.btn-play{
  font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;
  background:linear-gradient(135deg,var(--cyan),#00b4a0);
  color:#001a18;border:none;border-radius:50px;padding:.78rem;
  cursor:pointer;box-shadow:0 8px 28px rgba(0,229,200,.22);
  transition:transform .15s,box-shadow .15s;text-align:center;
}
.btn-play:hover{transform:translateY(-2px);box-shadow:0 12px 38px rgba(0,229,200,.38);}
.btn-extra-path{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;font-weight:700;
  background:rgba(0,229,200,.08);color:var(--cyan);
  border:1px solid rgba(0,229,200,.3);border-radius:50px;padding:.65rem;
  cursor:pointer;transition:background .2s;text-align:center;
}
.btn-extra-path:hover{background:rgba(0,229,200,.18);}

/* ══════════════════════════════════════════
   GAME SCREEN
══════════════════════════════════════════ */
#game.active{min-height:100vh;padding:4.5rem .85rem 1rem;}
.g-header{
  background:var(--glass);border:1px solid var(--border);border-radius:var(--r);
  padding:.72rem 1rem;margin-bottom:.7rem;
  display:flex;align-items:center;gap:.7rem;
}
.g-actname{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;}
.g-lv{font-size:.7rem;color:var(--muted2);margin-top:.1rem;}
.prog-wrap{margin-bottom:.7rem;}
.prog-bg{background:rgba(255,255,255,.07);border-radius:50px;height:5px;overflow:hidden;}
.prog-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--cyan),var(--violet2));transition:width .45s ease;}
.prog-lbl{font-size:.7rem;color:var(--muted);margin-top:.3rem;text-align:right;}
.puzzle-area{
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--r);padding:1.25rem;
  display:flex;flex-direction:column;gap:.65rem;
  backdrop-filter:blur(12px);
}
.p-ctx{
  font-size:.81rem;color:var(--muted2);font-style:italic;
  border-left:3px solid rgba(139,92,246,.4);padding-left:.75rem;
  line-height:1.7;background:rgba(139,92,246,.05);
  border-radius:0 8px 8px 0;padding:.5rem .75rem;
}
.p-instr{
  font-size:.83rem;color:var(--accent);font-weight:700;
  background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.2);
  border-radius:10px;padding:.5rem .85rem;
}

/* step rows */
.step-disp{display:flex;flex-direction:column;gap:.4rem;}
.srow{display:flex;align-items:flex-start;gap:.6rem;background:rgba(255,255,255,.03);border-radius:9px;padding:.42rem .7rem;border:1px solid var(--border);}
.snum{min-width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--pink));display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;flex-shrink:0;margin-top:2px;}
.stxt{font-size:.82rem;line-height:1.55;}

/* drag / tap */
.drag-target{
  min-height:52px;border:1.5px dashed rgba(139,92,246,.5);border-radius:10px;
  padding:.5rem .65rem;display:flex;align-items:center;flex-wrap:wrap;gap:.38rem;
  transition:background .2s,border-color .2s;background:rgba(139,92,246,.04);
  position:relative;
}
.tgt-hint{
  font-size:.78rem;color:var(--muted);font-style:italic;
  pointer-events:none;user-select:none;width:100%;text-align:center;padding:.2rem 0;
}
.drag-tokens{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.6rem;}
.token{
  background:rgba(139,92,246,.15);border:1.5px solid rgba(139,92,246,.4);
  border-radius:10px;padding:.38rem .75rem;cursor:pointer;font-size:.9rem;
  font-weight:700;user-select:none;
  transition:transform .15s,opacity .25s,background .2s,border-color .2s;
  -webkit-tap-highlight-color:transparent;
}
.token:hover,.token:active{transform:scale(1.08);background:rgba(139,92,246,.3);}
.token.placed{opacity:.22;pointer-events:none;}
.token.in-tgt{
  background:rgba(0,229,200,.15);border-color:var(--cyan);color:var(--cyan);
  cursor:pointer;pointer-events:auto;opacity:1;
}
.token.in-tgt:hover,.token.in-tgt:active{background:rgba(0,229,200,.28);transform:scale(1.06);}
@keyframes tokenPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}

/* match */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;}
.match-col{display:flex;flex-direction:column;gap:.4rem;}
.mitem{
  background:rgba(255,255,255,.05);border:1.5px solid var(--border);
  border-radius:10px;padding:.5rem .75rem;cursor:pointer;font-size:.8rem;
  font-weight:600;transition:border-color .2s,background .2s,transform .15s;text-align:center;
}
.mitem:hover{border-color:var(--violet2);background:rgba(139,92,246,.08);transform:scale(1.02);}
.mitem.sel{border-color:var(--accent);background:rgba(245,200,66,.1);}
.mitem.matched{border-color:var(--cyan)!important;background:rgba(0,229,200,.08)!important;cursor:default;color:var(--cyan);}
.mitem.wrong{border-color:var(--accent2)!important;background:rgba(255,95,126,.08)!important;animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* word search */
.ws-wrap{display:flex;gap:.9rem;flex-wrap:wrap;align-items:flex-start;}
.ws-grid{
  display:inline-grid;gap:2px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:10px;padding:.4rem;
  cursor:crosshair;user-select:none;
}
